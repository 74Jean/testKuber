services:

  mysql-products:
    image: mysql:8.0
    container_name: mysql-products
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: products_db
    ports:
      - "3307:3306"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-orders:
    image: mysql:8.0
    container_name: mysql-orders
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders_db
    ports:
      - "3308:3306"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql-products
      DB_PORT: 3306
      DB_NAME: products_db
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      mysql-products:
        condition: service_healthy
    networks:
      - microservices-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: mysql-orders
      DB_PORT: 3306
      DB_NAME: orders_db
      DB_USER: root
      DB_PASSWORD: root
      PRODUCT_SERVICE_URL: http://product-service:8081
    depends_on:
      mysql-orders:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge